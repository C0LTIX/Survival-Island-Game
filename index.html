<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crash Survival Island</title>
<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
}

#inventory{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
background:rgba(0,0,0,0.6);
padding:10px;
}

.slot{
width:50px;
height:50px;
border:1px solid white;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

#settings{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.7);
padding:10px;
}

</style>
</head>
<body>

<div id="hud">
Health: <span id="health">100</span><br>
Hunger: <span id="hunger">100</span><br>
Thirst: <span id="thirst">100</span><br>
Press E to collect
</div>

<div id="inventory"></div>

<div id="settings">
<b>Settings</b><br>

Graphics
<select id="graphics">
<option>Low</option>
<option selected>Medium</option>
<option>High</option>
</select>

<br><br>

Rain
<button onclick="toggleRain()">Toggle</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<script>

// scene

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

// lighting

const sun = new THREE.DirectionalLight(0xffffff,1)
scene.add(sun)

const ambient = new THREE.AmbientLight(0x555555)
scene.add(ambient)

// ocean

const waterGeo = new THREE.PlaneGeometry(2000,2000)
const waterMat = new THREE.MeshBasicMaterial({color:0x2266aa})

const ocean = new THREE.Mesh(waterGeo,waterMat)
ocean.rotation.x = -Math.PI/2
ocean.position.y = -2

scene.add(ocean)

// island

function createIsland(){

const size = 200
const seg = 120

const geo = new THREE.PlaneGeometry(size,size,seg,seg)

const pos = geo.attributes.position

for(let i=0;i<pos.count;i++){

let x = pos.getX(i)
let y = pos.getY(i)

let dist = Math.sqrt(x*x+y*y)/100

let h = (Math.random()*4)*(1-dist)

pos.setZ(i,h)

}

geo.computeVertexNormals()

const mat = new THREE.MeshStandardMaterial({
color:0x228822,
flatShading:true
})

const island = new THREE.Mesh(geo,mat)
island.rotation.x = -Math.PI/2

scene.add(island)

}

createIsland()

// player

const playerGeo = new THREE.BoxGeometry(1,2,1)
const playerMat = new THREE.MeshStandardMaterial({color:0xffffff})

const player = new THREE.Mesh(playerGeo,playerMat)

player.position.y = 2

scene.add(player)

camera.position.set(0,6,10)

// plane wreck

function spawnPlane(){

const geo = new THREE.BoxGeometry(6,2,2)
const mat = new THREE.MeshStandardMaterial({color:0x444444})

const wreck = new THREE.Mesh(geo,mat)

wreck.position.set(0,1,0)

scene.add(wreck)

}

spawnPlane()

// resources

const resources=[]

function spawnTree(x,z){

const trunkGeo = new THREE.CylinderGeometry(0.3,0.5,3)

const trunkMat = new THREE.MeshStandardMaterial({color:0x8b5a2b})

const trunk = new THREE.Mesh(trunkGeo,trunkMat)

trunk.position.set(x,1.5,z)

scene.add(trunk)

resources.push({mesh:trunk,type:"wood"})

}

function spawnRock(x,z){

const geo = new THREE.DodecahedronGeometry(1)

const mat = new THREE.MeshStandardMaterial({color:0x777777})

const rock = new THREE.Mesh(geo,mat)

rock.position.set(x,1,z)

scene.add(rock)

resources.push({mesh:rock,type:"stone"})

}

for(let i=0;i<40;i++){

spawnTree(Math.random()*180-90,Math.random()*180-90)
spawnRock(Math.random()*180-90,Math.random()*180-90)

}

// inventory

const inventory=[]

function addItem(name){

inventory.push(name)

renderInventory()

}

function renderInventory(){

const inv = document.getElementById("inventory")

inv.innerHTML=""

inventory.forEach(i=>{

const s=document.createElement("div")
s.className="slot"
s.innerText=i

inv.appendChild(s)

})

}

// controls

const keys={}

document.addEventListener("keydown",e=>{

keys[e.key.toLowerCase()]=true

if(e.key==="e") collect()

})

document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

// collect resource

function collect(){

resources.forEach((r,i)=>{

const d = player.position.distanceTo(r.mesh.position)

if(d<3){

addItem(r.type)

scene.remove(r.mesh)

resources.splice(i,1)

}

})

}

// survival stats

let health=100
let hunger=100
let thirst=100

// rain

let raining=false
let rain

function toggleRain(){

if(!raining){

const geo = new THREE.BufferGeometry()

const count=5000
const pos = new Float32Array(count*3)

for(let i=0;i<count;i++){

pos[i*3]=Math.random()*200-100
pos[i*3+1]=Math.random()*50
pos[i*3+2]=Math.random()*200-100

}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3))

const mat = new THREE.PointsMaterial({color:0xaaaaaa,size:0.1})

rain = new THREE.Points(geo,mat)

scene.add(rain)

raining=true

}else{

scene.remove(rain)
raining=false

}

}

// time

let time=0

// game loop

function animate(){

requestAnimationFrame(animate)

const speed=0.2

if(keys["w"]) player.position.z-=speed
if(keys["s"]) player.position.z+=speed
if(keys["a"]) player.position.x-=speed
if(keys["d"]) player.position.x+=speed

camera.position.x = player.position.x
camera.position.z = player.position.z+10

camera.lookAt(player.position)

// day night

time+=0.001

sun.position.x = Math.sin(time)*100
sun.position.y = Math.cos(time)*100

// survival

hunger-=0.01
thirst-=0.015

if(hunger<0 || thirst<0) health-=0.03

document.getElementById("health").innerText=Math.floor(health)
document.getElementById("hunger").innerText=Math.floor(hunger)
document.getElementById("thirst").innerText=Math.floor(thirst)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
